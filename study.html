<!DOCTYPE html>
<html>
<head>
    <title>Study Flashcards</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        h1 {
            text-align: center;
            color: #333;
            font-size: 24px;
            margin: 5px 0 15px 0;
        }
        
        .study-mode {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 10px 0 15px 0;
            padding: 8px;
            background: white;
            border-radius: 50px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .mode-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            flex: 1;
            max-width: 200px;
        }
        
        .mode-btn.active {
            background: #667eea;
            color: white;
        }
        
        .mode-btn:not(.active) {
            background: #f0f0f0;
            color: #666;
        }
        
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            margin: 10px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
        }
        
        .counter {
            text-align: center;
            margin: 8px 0;
            color: #666;
            font-size: 15px;
            font-weight: 500;
        }
        
        /* Flashcard - BALANCED HEIGHT */
        .flashcard {
            background: white;
            border-radius: 20px;
            padding: 35px 20px;
            margin: 12px 0;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            cursor: pointer;
            text-align: center;
            min-height: 160px;
            max-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 2px solid transparent;
            overflow-y: auto;
        }
        
        .flashcard:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
            border-color: #667eea;
        }
        
        .term {
            font-size: 28px;
            font-weight: bold;
            color: #2196F3;
            line-height: 1.4;
            word-break: break-word;
        }
        
        .definition {
            font-size: 18px;
            color: #333;
            line-height: 1.5;
            max-width: 95%;
            margin: 0 auto;
            word-break: break-word;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 15px 0 10px 0;
            flex-wrap: wrap;
        }
        
        .controls button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
            min-width: 130px;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        
        .controls button:hover {
            background: #764ba2;
            transform: translateY(-1px);
        }
        
        .tap-hint {
            background: #f0f0f0;
            padding: 6px 14px;
            border-radius: 25px;
            display: inline-block;
            margin: 5px auto;
            color: #666;
            font-size: 13px;
            text-align: center;
            width: fit-content;
        }
        
        .hint {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 8px;
        }
        
        .hint-container {
            display: flex;
            justify-content: center;
            width: 100%;
        }
        
        /* Mobile optimization */
        @media (max-width: 480px) {
            body {
                padding: 15px;
            }
            
            h1 {
                font-size: 22px;
                margin: 0 0 10px 0;
            }
            
            .flashcard {
                padding: 25px 15px;
                min-height: 140px;
                max-height: 220px;
            }
            
            .term {
                font-size: 24px;
            }
            
            .definition {
                font-size: 16px;
            }
            
            .controls button {
                padding: 10px 20px;
                min-width: 110px;
                font-size: 14px;
            }
            
            .mode-btn {
                padding: 8px 16px;
                font-size: 13px;
            }
        }
        
        /* For shorter screens */
        @media (max-height: 750px) {
            .flashcard {
                min-height: 140px;
                padding: 25px 15px;
            }
            
            h1 {
                font-size: 22px;
                margin: 0 0 8px 0;
            }
            
            .study-mode {
                margin: 5px 0 10px 0;
                padding: 6px;
            }
            
            .controls {
                margin: 10px 0 5px 0;
            }
        }
    </style>
</head>
<body>
    <h1>📚 Study Flashcards</h1>
    
    <!-- Study Mode Toggle -->
    <div class="study-mode">
        <button class="mode-btn active" id="defToTermBtn" onclick="setMode('definition-to-term')">
            📖 Definition → Term
        </button>
        <button class="mode-btn" id="termToDefBtn" onclick="setMode('term-to-definition')">
            📝 Term → Definition
        </button>
    </div>
    
    <!-- Progress Bar -->
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    
    <!-- Counter -->
    <div class="counter" id="counter">Card 1 of 0</div>
    
    <!-- Flashcard -->
    <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div id="displayContent" class="term">Loading...</div>
    </div>
    
    <!-- Tap Hint -->
    <div class="tap-hint" id="tapHint">👆 Tap card to flip</div>
    
    <!-- Navigation Controls -->
    <div class="controls">
        <button onclick="prevCard()">← Previous</button>
        <button onclick="nextCard()">Next →</button>
    </div>
    
    <!-- Keyboard Shortcuts Hint -->
    <div class="hint">
        ⬅️ ➡️ arrow keys to navigate • spacebar to flip
    </div>
    
    <script>
        // Get flashcards from URL
        const urlParams = new URLSearchParams(window.location.search);
        const flashcardData = urlParams.get('set');
        let flashcards = [];
        
        if (flashcardData) {
            try {
                flashcards = JSON.parse(decodeURIComponent(flashcardData));
            } catch (e) {
                document.getElementById('displayContent').innerHTML = 'Error loading flashcards';
            }
        }
        
        // Game state
        let currentCard = 0;
        let showingTerm = false; // Default: show definition first (so showingTerm = false means showing definition)
        let studyMode = 'definition-to-term'; // Default mode
        
        // DOM elements
        const displayContent = document.getElementById('displayContent');
        const counter = document.getElementById('counter');
        const progressFill = document.getElementById('progressFill');
        const tapHint = document.getElementById('tapHint');
        const defToTermBtn = document.getElementById('defToTermBtn');
        const termToDefBtn = document.getElementById('termToDefBtn');
        
        // Update display based on current state
        function updateDisplay() {
            if (flashcards.length === 0) {
                displayContent.textContent = 'No flashcards';
                return;
            }
            
            const card = flashcards[currentCard];
            
            // Determine what to show based on mode and flip state
            if (studyMode === 'definition-to-term') {
                // Default: show definition, flip shows term
                if (showingTerm) {
                    displayContent.textContent = card.term;
                    displayContent.className = 'term';
                    tapHint.textContent = '👆 Tap to see definition';
                } else {
                    displayContent.textContent = card.definition;
                    displayContent.className = 'definition';
                    tapHint.textContent = '👆 Tap to see term';
                }
            } else {
                // Term-to-definition mode: show term, flip shows definition
                if (showingTerm) {
                    displayContent.textContent = card.term;
                    displayContent.className = 'term';
                    tapHint.textContent = '👆 Tap to see definition';
                } else {
                    displayContent.textContent = card.definition;
                    displayContent.className = 'definition';
                    tapHint.textContent = '👆 Tap to see term';
                }
            }
            
            // Update counter and progress
            counter.textContent = `Card ${currentCard + 1} of ${flashcards.length}`;
            const progressPercent = ((currentCard + 1) / flashcards.length) * 100;
            progressFill.style.width = progressPercent + '%';
        }
        
        // Flip card
        function flipCard() {
            showingTerm = !showingTerm;
            updateDisplay();
        }
        
        // Next card
        function nextCard() {
            if (currentCard < flashcards.length - 1) {
                currentCard++;
                // Reset to showing the default side based on mode
                showingTerm = (studyMode === 'term-to-definition'); 
                updateDisplay();
            }
        }
        
        // Previous card
        function prevCard() {
            if (currentCard > 0) {
                currentCard--;
                // Reset to showing the default side based on mode
                showingTerm = (studyMode === 'term-to-definition');
                updateDisplay();
            }
        }
        
        // Set study mode
        function setMode(mode) {
            studyMode = mode;
            
            // Update button styles
            if (mode === 'definition-to-term') {
                defToTermBtn.classList.add('active');
                termToDefBtn.classList.remove('active');
                showingTerm = false; // Show definition first
            } else {
                termToDefBtn.classList.add('active');
                defToTermBtn.classList.remove('active');
                showingTerm = true; // Show term first
            }
            
            updateDisplay();
        }
        
        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                prevCard();
            } else if (e.key === 'ArrowRight') {
                nextCard();
            } else if (e.key === ' ' || e.key === 'Spacebar') {
                e.preventDefault();
                flipCard();
            }
        });
        
        // Initialize display
        if (flashcards.length > 0) {
            setMode('definition-to-term'); // Set default mode
        }
        
        // Show total cards in title
        if (flashcards.length > 0) {
            document.title = `Flashcards (${flashcards.length} cards)`;
        }
    </script>
</body>
</html>
